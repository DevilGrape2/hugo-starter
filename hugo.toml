baseURL = '/'          # 网站域名（部署时必须正确设置）
languageCode = 'zh-CN'  # 语言代码（如en-US、ja-JP）
title = '生活记录'      # 网站标题（将显示在浏览器标签和首页）
theme = 'ananke'        # 指定使用的主题名称（需放在themes目录下）

# Theme parameters
[params]
  author = "mengfeis"                     # 作者名
  featured_image = "https://vip.123pan.cn/1815989482/ymjew503t0l000ddqgbs6uoprrb1k5m9DIYPAIr1BIF1DpxPDwF2DY==.png"
  # avatar = "/images/avatar.jpg"       # 头像路径（图片放在static/images/下）
  site_logo = ""
  description = "分享技术与生活的博客"  # 网站描述（用于SEO）
  keywords = ["技术", "博客", "Hugo"] # SEO关键词
  # 社交链接（主题通常会在页脚或侧边栏显示）
  social = [
    { name = "GitHub", url = "https://github.com/your-name" },
    { name = "知乎", url = "https://zhihu.com/people/your-name" }
  ]
  
  body_classes = "avenir bg-near-white"

# Menu Configuration
[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 1
    
  [[menu.main]]
    name = "文章"
    url = "/post/"
    weight = 2
 
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 3


# Outputs configuration
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]
