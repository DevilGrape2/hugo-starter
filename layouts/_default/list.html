<div class="page-with-sidebar">
  <main class="main-content">
    {{/* 主内容区域... */}}
  </main>
  
  <aside class="sidebar">
    {{ partial "author-sidebar.html" . }}
    
    {{/* 文章数量统计 */}}
    {{ $posts := where .Site.RegularPages "Type" "eq" "post" }}
    <div class="statistics">
      <h3>Statistics</h3>
      <p>Total Posts: {{ len $posts }}</p>
    </div>
  </aside>
</div>
