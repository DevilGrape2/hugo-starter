<aside class="author-sidebar">
  {{/* 假设站点只有一位作者，可硬编码文件名 */}}
  {{ $author := index .Site.Data.authors "john_doe" }}
  {{ with $author }}
    <div class="author-card">
      <img src="{{ .avatar }}" alt="{{ .name }}" class="author-avatar">
      <h3 class="author-name">{{ .name }}</h3>
      {{ with .bio }}
        <p class="author-bio">{{ . }}</p>
      {{ end }}
      
      {{ if or .email .socials }}
      <div class="author-links">
        {{ with .email }}
          <a href="mailto:{{ . }}" title="Email">📧</a>
        {{ end }}
        {{ range $key, $value := .socials }}
          <a href="{{ $value }}" title="{{ $key | title }}" target="_blank" rel="noopener">🔗</a>
        {{ end }}
      </div>
      {{ end }}
    </div>
  {{ end }}
</aside>
